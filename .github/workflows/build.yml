name: Build Binaries

on: 
  push:
  pull_request:
  release:
    types: [ created ]


permissions:
  contents: read

jobs:
  windows-x64:
    name: "Build Windows x64"
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3
      with:
        msbuild-architecture: x64

    - name: run-vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        runVcpkgInstall: true
        vcpkgGitCommitId: '03e366fb91e38b9432ebd5f8cc79f7c8f55e96ab'
        
    - name: Integrate vcpkg
      run: vcpkg integrate install

    - name: Build Release
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        msbuild /m /p:VcpkgEnableManifest=true /p:Platform=x64 /p:Configuration=Release
        copy LICENSE x64/Release/LICENSE.txt
      
    - name: Build Debug
      working-directory: ${{env.GITHUB_WORKSPACE}} 
      run: |
        msbuild /m /p:VcpkgEnableManifest=true /p:Platform=x64 /p:Configuration=Debug
        copy LICENSE x64/Debug/LICENSE.txt
      
    - uses: actions/upload-artifact@v7
      with:
        name: win-x64-release
        path: |
          x64/Release/SGDBoop.exe
          x64/Release/libcurl.dll
          x64/Release/zlib1.dll
          x64/Release/z.dll
          x64/Release/LICENSE.txt

    - uses: actions/upload-artifact@v7
      with:
        name: win-x64-debug
        path: x64/Debug/*

  windows-arm64:
    name: "Build Windows arm64"
    runs-on: windows-11-vs2026-arm

    steps:
    - uses: actions/checkout@v7

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3
      with:
        msbuild-architecture: arm64

    - name: run-vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        runVcpkgInstall: true
        vcpkgGitCommitId: '4b77da7fed37817f124936239197833469f1b9a8'
        
    - name: Integrate vcpkg
      run: vcpkg integrate install

    - name: Build Release
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        msbuild /m /p:VcpkgEnableManifest=true /p:Platform=ARM64 /p:Configuration=Release
        copy LICENSE ARM64/Release/LICENSE.txt
      
    - name: Build Debug
      working-directory: ${{env.GITHUB_WORKSPACE}} 
      run: |
        msbuild /m /p:VcpkgEnableManifest=true /p:Platform=ARM64 /p:Configuration=Debug
        copy LICENSE ARM64/Debug/LICENSE.txt
      
    - uses: actions/upload-artifact@v7
      with:
        name: win-arm64-release
        path: |
          ARM64/Release/SGDBoop.exe
          ARM64/Release/libcurl.dll
          ARM64/Release/zlib1.dll
          ARM64/Release/z.dll
          ARM64/Release/LICENSE.txt

    - uses: actions/upload-artifact@v7
      with:
        name: win-arm64-debug
        path: ARM64/Debug/*

  linux-x64:
    name: "Build Linux x64"
    runs-on: ubuntu-slim
    env:
      OS: Linux

    steps:
    - uses: actions/checkout@v7

    - name: Install libcurl, GTK3
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libgtk-3-dev

    - name: Build
      run: make dist
      
    - uses: actions/upload-artifact@v7
      with:
        name: linux-x64
        path: dist/*

  linux-aarch64:
    name: "Build Linux aarch64"
    runs-on: ubuntu-22.04-arm
    env:
      OS: Linux

    steps:
    - uses: actions/checkout@v7

    - name: Install libcurl, GTK3
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libgtk-3-dev

    - name: Build
      run: make dist

    - uses: actions/upload-artifact@v7
      with:
        name: linux-aarch64
        path: dist/*

  macos:
    name: "Build MacOS Universal"
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v7

    - name: Install libcurl
      run: |
        brew install curl

    - name: Build
      run: make dist

    - uses: actions/upload-artifact@v7
      with:
        name: macos-universal
        path: dist/*

  release:
    if: github.event_name == 'release' && github.event.action == 'created'
    name: "Upload Artifacts to Release"
    runs-on: ubuntu-slim
    permissions:
      contents: write
    needs: [windows-x64, windows-arm64,linux-x64,linux-aarch64, macos]
    steps:
    - uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Archive Windows Release Builds
      run: |
        7z a sgdboop-win64.zip ./artifacts/win-x64-release/*
        7z a sgdboop-winarm64.zip ./artifacts/win-arm64-release/*

    - name: Get release dists built via "make dist"
      run: |
        mv artifacts/linux-x64/sgdboop-linux-x86_64.tar.gz ../../
        mv artifacts/linux-aarch64/sgdboop-linux-aarch64.tar.gz ../../
        mv artifacts/macos-universal/sgdboop-darwin-universal.zip ../../

    - uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        omitName: true
        omitBody: true
        replacesArtifacts: true
        tag: ${{github.event.release.tag_name}}
        commit: ${{github.sha}}
        artifacts: "sgdboop-linux-x86_64.tar.gz,sgdboop-linux-aarch64.tar.gz,sgdboop-win64.zip,sgdboop-winarm64.zip,sgdboop-darwin-universal.zip"
